Click anywhere on the map to get links to Google, Bing and OpenStreetMap maps <br> showing their markers, pictures  and annotations. <br>

<body>

<div id="map" style="height: 700px;"></div>

<script src="links.js"></script>
<script src="places-geojson.js" type="text/javascript"></script>

<script>
	
	//var map = L.map('map').setView([37.032375, -97.121173], 4); 
	var map = L.map('map').setView([39.718437, -77.553495], 6);   // Gettysburg focus


	L.esri.basemapLayer('Topographic').addTo(map);

	const visitor_icon = L.icon({
			iconUrl: 'images/logo.png',
			iconSize: [15, 20],
			iconAnchor: [20, 25],
			popupAnchor: [0, 0]
	    });
		
	function onEachFeature(feature, layer) {
		let popupContent = `<b>National Park: `;

		if (feature.properties && feature.properties.popupContent) {
			popupContent += feature.properties.popupContent;
		}

		layer.bindPopup(popupContent);
	}

	//const parkLayer = L.geoJSON([park, campus], {
	const parkLayer = L.geoJSON([park], {

		style(feature) {
			return feature.properties && feature.properties.style;
		},

		onEachFeature,

		pointToLayer(feature, latlng) {
			return L.marker(latlng, {icon: visitor_icon});
		}
	}).addTo(map);

	const popup = L.popup();
	
	var googlelink = "";
	var coords = "";
	var link ="";
	var url ="";
	
	// add OpenStreetMap links, like https://www.openstreetmap.org/search?query=39.818232%2C+-77.280064&zoom=13
      map.on('click', function(e) {
	     coords = e.latlng.toString().substring(7,e.latlng.toString().length-1);
		 url = 'https://www.google.com/maps/place/' + coords;
		 link = '<a href="' + url + '" >Google maps link</a>';
		 googlelink = coords + '<br>' + link;
		 
		 opencoords = coords.replace(' ','');
		 openurl = 'https://www.openstreetmap.org/search?query=' + opencoords + '#map=16';
	     openlink = '<a href="' + openurl + '" >OpenStreetMap link</a>';
		 
		 bingcoords = coords.replace(', ','~');
		 bingurl = 'https://www.bing.com/maps/search?cp=' + bingcoords + '&lvl=15';
	     binglink = '<a href="' + bingurl + '" >Bing maps link</a>';

		
      });

	function onMapClick(e) {
		popup
			.setLatLng(e.latlng)
			.setContent(googlelink + '<br>' + binglink + '<br>' + openlink )
			.openOn(map)
	}

	map.on('click', onMapClick);
		


</script>
